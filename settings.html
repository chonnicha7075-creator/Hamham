<div class="hamham-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>🐹 HAMHAM ✿ Living World Memory</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <h4>
                <span class="hamham-brand-mini">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="7" cy="7" r="2.5" fill="#ED93B1"/>
                        <circle cx="17" cy="7" r="2.5" fill="#ED93B1"/>
                        <circle cx="12" cy="12.5" r="7" fill="#F4C0D1"/>
                        <circle cx="9.5" cy="11.5" r="0.9" fill="#4B1528"/>
                        <circle cx="14.5" cy="11.5" r="0.9" fill="#4B1528"/>
                    </svg>
                </span>
                HAMHAM settings
            </h4>

            <div class="hamham-row">
                <div>
                    <label for="hamham-toggle-icon">Show floating icon</label>
                    <div class="hint">The small hamster in the corner you tap to open HAMHAM</div>
                </div>
                <label class="hamham-toggle">
                    <input type="checkbox" id="hamham-toggle-icon" checked />
                    <span class="hamham-toggle-slider"></span>
                </label>
            </div>

            <div class="hamham-row">
                <div>
                    <label for="hamham-toggle-autobond">Auto-update bonds</label>
                    <div class="hint">Scan new messages to track NPC mentions and bond levels</div>
                </div>
                <label class="hamham-toggle">
                    <input type="checkbox" id="hamham-toggle-autobond" checked />
                    <span class="hamham-toggle-slider"></span>
                </label>
            </div>

            <div class="hamham-row">
                <div>
                    <label>Open HAMHAM panel</label>
                    <div class="hint">Manually open the main panel</div>
                </div>
                <button id="hamham-open-panel-btn" class="menu_button" type="button">Open</button>
            </div>

            <div class="hamham-row">
                <div>
                    <label>Reset everything</label>
                    <div class="hint">Delete ALL character data (cannot be undone)</div>
                </div>
                <button id="hamham-reset-all-btn" class="menu_button hamham-danger-btn" type="button">Reset all</button>
            </div>

            <div class="hamham-row">
                <div>
                    <label>About</label>
                    <div class="hint">HAMHAM v1.0.0 · by chonnicha7075-creator</div>
                </div>
                <a href="https://github.com/chonnicha7075-creator/Hamham" target="_blank" rel="noopener" class="menu_button" style="text-decoration: none;">GitHub ↗</a>
            </div>
        </div>
    </div>
</div>
